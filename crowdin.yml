# Crowdin Configuration
# Documentation: https://developer.crowdin.com/configuration-file/
#
# Source language: Spanish (es) — set this in your Crowdin project settings.
# Source strings are original Spanish content extracted from RAE.

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: "."

# Preserve the hierarchy of files/folders in Crowdin
preserve_hierarchy: true

files:
  # UI strings — Spanish source, translated into each target language
  - source: /translations/source.json
    translation: /translations/%locale%/translations.json
    type: json
    update_option: update_as_unapproved

  # Vocabulary word translations — Spanish words as source.
  # Each entry: "<wordId>": "<spanish word>"
  - source: /translations/vocabulary/source.json
    translation: /translations/vocabulary/%locale%/source.json
    type: json
    update_option: update_as_unapproved
